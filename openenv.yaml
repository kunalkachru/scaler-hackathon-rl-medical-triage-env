title: Medical Triage Environment
emoji: 🏥
colorFrom: blue
colorTo: green
sdk: docker
pinned: false
app_port: 7860
tags:
  - openenv
  - medical
  - triage
  - healthcare
  - reinforcement-learning
  - fairness
  - bias-detection

name: medical_triage_env
version: "2.3.0"
description: >
  An OpenEnv RL environment for clinical triage. An AI agent reads patient cases
  and performs triage using NHS NEWS2 and PEWS. Eight tasks of increasing difficulty and
  real-world clinical fidelity: simple triage, conflicting vitals, masked
  deterioration (pharmacological masking), demographic fairness (bias detection),
  deteriorating patient (multi-turn escalation), sepsis bundle compliance
  (Surviving Sepsis Campaign Hour-1 Bundle), paediatric triage (PEWS age-specific
  thresholds), and medication reconciliation (drug interactions, dosing errors).
  All graders are deterministic, using peer-reviewed clinical protocols.
  Research-grounded: addresses documented harms from Mount Sinai (1.7M LLM outputs),
  Oxford Medical School, Bordeaux University Hospital, MIMIC-III deterioration studies,
  PRISM/SSC sepsis trials, and NPSA Safer Practice Notice 2006 (methotrexate dosing).

author: "Team Falcons - Scaler Meta PyTorch Hackathon 2026"

tasks:
  - id: simple_triage
    name: Simple Triage Classification
    difficulty: easy
    cases: 10

  - id: conflicting_vitals
    name: Conflicting Vitals Assessment
    difficulty: medium
    cases: 8

  - id: masked_deterioration
    name: Masked Deterioration Detection
    difficulty: hard
    cases: 10

  - id: demographic_fairness
    name: Demographic Fairness Evaluation
    difficulty: medium
    cases: 12
    research: "Mount Sinai Nature Medicine 2025; Bordeaux University Hospital 150k admissions"

  - id: deteriorating_patient
    name: Deteriorating Patient (Multi-Turn)
    difficulty: hard
    cases: 7
    research: "MIMIC-III; npj Digital Medicine 2025; 70% preventable ED deaths post-assessment"

  - id: sepsis_bundle
    name: Sepsis Hour-1 Bundle Compliance
    difficulty: hard
    cases: 4
    research: "Surviving Sepsis Campaign 2021 Guidelines; PRISM meta-analysis 3 million patients; ARISE PROCESS ProCESS trials"

  - id: paediatric_triage
    name: Paediatric Triage (PEWS)
    difficulty: hard
    cases: 6
    research: "PEWS — Duncan 2006; RCPCH 2017 guidance; paediatric sepsis kills 1 in 14 children (RCPCH 2021)"

  - id: medication_reconciliation
    name: Medication Reconciliation
    difficulty: hard
    cases: 6
    research: "NPSA Safer Practice Notice 2006 (methotrexate); BNF; BMJ 2005 warfarin-NSAID bleeding risk 3×; MHRA AKI alerts"

  - id: icu_deterioration
    name: ICU Deterioration (SOFA)
    difficulty: hard
    cases: 4
    research: "SOFA score — Vincent et al. 1996; ESICM Guidelines 2023; ICU mortality doubles per 2-point SOFA rise"

  - id: sbar_handover
    name: SBAR Clinical Handover
    difficulty: medium
    cases: 4
    research: "NHS SBAR Framework 2018; ISBAR tool — Joint Commission 2017; 70% of sentinel events involve communication failures"

  - id: differential_diagnosis
    name: Differential Diagnosis (Safety-Net)
    difficulty: hard
    cases: 4
    research: "Diagnostic error causes 40,000-80,000 deaths/year (BMJ 2021); must-not-miss framework — Murtagh's General Practice"

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health
  tasks: GET /tasks
  grade_fairness: POST /grade-fairness
  metrics: GET /metrics
  compute_news2: POST /compute-news2
  learning_curve: GET /learning-curve

# Returned step/task scores are remapped to the open interval (0, 1); see models.task_score_for_api
reward_range: [0.0001, 0.9999]
max_steps_per_episode: 3
total_cases: 75
